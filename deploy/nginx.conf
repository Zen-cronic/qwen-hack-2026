server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + media proxied to the FastAPI app service. Media clips can be large,
    # so allow big proxied responses and long generation polls.
    location /api/ {
        proxy_pass http://app:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 25m;
    }

    # SPA client-side routing: fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
