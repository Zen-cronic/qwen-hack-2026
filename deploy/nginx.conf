server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + media proxied to the FastAPI app service. Media clips can be large,
    # so allow big proxied responses and long generation polls.
    location /api/ {
        proxy_pass http://app:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 25m;
    }

    # The SPA shell must never be cached: a judge hitting a stale index.html after a
    # redeploy would request hashed bundles that no longer exist — a blank page in the
    # one session that decides eligibility. Assets are content-hashed, so they get the
    # opposite policy.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA client-side routing: fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
