name: CI

# The project's own thesis, applied to itself: a conformance harness whose tests
# don't run on every push is the DAILIES_QC = False pattern. No secrets needed —
# the suite runs entirely on fakes (zero quota, no .env).
on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,mcp,agent]"
      - run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
